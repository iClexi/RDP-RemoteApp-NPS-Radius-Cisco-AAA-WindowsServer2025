!
! R1 - Laboratorio RDS IIS NPS/RADIUS AAA
! Autor: Michael David Robles Fermín - 2025-0845
!
hostname R1
no ip domain-lookup
!
interface GigabitEthernet0/0
 description Enlace hacia SW1 - Red Cliente Kali
 ip address 10.8.45.1 255.255.255.128
 no shutdown
!
interface GigabitEthernet0/1
 description Enlace hacia SW2 - Red Windows Server NPS
 ip address 10.8.45.129 255.255.255.128
 no shutdown
!
ip domain-name michael20250845.local
!
enable secret Enable20250845*
username localadmin privilege 15 secret Local20250845*
!
! Si el router no tiene llaves RSA, ejecutar este comando en modo configuración:
! crypto key generate rsa modulus 2048
!
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
!
aaa new-model
!
aaa authentication login CONSOLE_LOCAL local
!
radius server NPS-SERVER
 address ipv4 10.8.45.130 auth-port 1812 acct-port 1813
 key Radius20250845*
!
aaa group server radius NPS-GROUP
 server name NPS-SERVER
 ip radius source-interface GigabitEthernet0/1
!
aaa authentication login default group NPS-GROUP local
aaa authorization exec default group NPS-GROUP local if-authenticated
aaa accounting exec default start-stop group NPS-GROUP
aaa accounting system default start-stop group NPS-GROUP
aaa session-id common
!
radius-server vsa send authentication
radius-server vsa send accounting
!
line console 0
 login authentication CONSOLE_LOCAL
!
line vty 0 4
 transport input ssh
 login authentication default
 authorization exec default
 accounting exec default
 exec-timeout 10 0
!
end
