!
! SW2 - Red Windows Server / NPS
! Enlaces:
!   Gi0/0 -> R1 Gi0/1
!   Gi0/1 -> Windows Server 2025
!
hostname SW2
no ip domain-lookup
!
vlan 10
 name SERVIDOR_WINDOWS
!
interface GigabitEthernet0/0
 description Enlace hacia R1 Gi0/1
 switchport mode access
 switchport access vlan 10
 no shutdown
!
interface GigabitEthernet0/1
 description Enlace hacia Windows Server 2025
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 no shutdown
!
interface Vlan10
 description Administracion SW2
 ip address 10.8.45.131 255.255.255.128
 no shutdown
!
ip default-gateway 10.8.45.129
!
end
