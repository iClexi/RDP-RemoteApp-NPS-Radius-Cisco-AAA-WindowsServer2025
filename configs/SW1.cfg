!
! SW1 - Red Cliente Kali
! Enlaces:
!   Gi0/0 -> R1 Gi0/0
!   Gi0/1 -> Kali Linux
!
hostname SW1
no ip domain-lookup
!
vlan 20
 name CLIENTE_KALI
!
interface GigabitEthernet0/0
 description Enlace hacia R1 Gi0/0
 switchport mode access
 switchport access vlan 20
 no shutdown
!
interface GigabitEthernet0/1
 description Enlace hacia Kali Linux
 switchport mode access
 switchport access vlan 20
 spanning-tree portfast
 no shutdown
!
interface Vlan20
 description Administracion SW1
 ip address 10.8.45.2 255.255.255.128
 no shutdown
!
ip default-gateway 10.8.45.1
!
end
